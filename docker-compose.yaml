services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: phishstats
      POSTGRES_USER: phishstats
      POSTGRES_PASSWORD: phishstats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishstats -d phishstats"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: ["/app/entrypoint.sh"]

volumes:
  postgres_data:
